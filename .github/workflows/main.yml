name: Proxy Check

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:         # ручной запуск

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Кеш для sing-box (бинарник)
      - name: Cache sing-box
        uses: actions/cache@v4
        id: cache-singbox
        with:
          path: /tmp/sing-box
          key: ${{ runner.os }}-singbox-v1.12.19

      - name: Download sing-box if not cached
        if: steps.cache-singbox.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/sing-box
          cd /tmp/sing-box
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.12.19/sing-box-1.12.19-linux-amd64.tar.gz
          tar -xzf sing-box-*.tar.gz
          mv sing-box-*/sing-box .
          chmod +x sing-box

      - name: Create config.yaml if missing
        run: |
          if [ ! -f config.yaml ]; then
            echo "{}" > config.yaml
          fi

      - name: Run proxy checker
        run: python proxy_checker.py

      # Сохраняем артефакты (опционально)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-results
          path: |
            output.txt
            top30.txt
            history.db
            source_stats.json
          retention-days: 7

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output.txt top30.txt history.db source_stats.json config.yaml

          git diff --staged --quiet || git commit -m "Update proxy lists and history [skip ci]"
          git push
