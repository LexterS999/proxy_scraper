name: Proxy Check

on:
  schedule:
    - cron: '0 */5 * * *'   # каждые 5 часов
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run proxy checker
        run: python proxy_checker.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.github.com"
          # Добавляем только существующие файлы
          for file in output.txt top30.txt history.json secret.key geo_cache.db; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          git diff --staged --quiet || git commit -m "Update proxy lists and history [skip ci]"
          git push
