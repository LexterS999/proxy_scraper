name: Proxy Check

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:          # ручной запуск

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Кеш для pip – ускоряет установку зависимостей
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Кеш для sing-box – бинарник скачивается один раз и переиспользуется
      - name: Cache sing-box
        uses: actions/cache@v4
        id: cache-singbox
        with:
          path: /tmp/sing-box
          key: ${{ runner.os }}-singbox-v1.12.19

      # Если кеш отсутствует, скрипт скачает его сам при первом запуске,
      # но мы можем явно создать директорию, чтобы кеш сохранился
      - name: Prepare sing-box cache directory
        run: mkdir -p /tmp/sing-box

      # Создаём пустой config.yaml, если его нет (скрипт не требует, но для порядка)
      - name: Ensure config.yaml exists
        run: |
          if [ ! -f config.yaml ]; then
            echo "{}" > config.yaml
          fi

      - name: Run proxy checker
        run: python proxy_checker.py

      # Коммитим все файлы, которые могут измениться
      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output.txt top30.txt history.json source_stats.json config.yaml

          git diff --staged --quiet || git commit -m "Update proxy lists and history [skip ci]"
          git push
