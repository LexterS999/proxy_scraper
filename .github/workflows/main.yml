name: Proxy Check

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:            # ручной запуск

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache sing-box
        uses: actions/cache@v4
        id: cache-singbox
        with:
          path: /tmp/sing-box
          key: ${{ runner.os }}-singbox-v1.12.19

      - name: Prepare sing-box cache directory
        run: mkdir -p /tmp/sing-box

      - name: Run proxy checker
        run: python proxy_checker.py
        env:
          PYTHONUNBUFFERED: 1   # логи в реальном времени

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for file in output.txt top30.txt history.json source_stats.json; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          git diff --staged --quiet || git commit -m "Update proxy lists and history [skip ci]"
          git push
