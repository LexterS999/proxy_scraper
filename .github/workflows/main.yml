name: Proxy Check

on:
  schedule:
    - cron: '30 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run proxy checker
        run: python proxy_checker.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # добавляем все файлы, которые могут измениться
          git add output.txt top30.txt history.json

          # если есть изменения – коммитим
          git diff --staged --quiet || git commit -m "Update proxy lists and history [skip ci]"

          # пушим обратно в репозиторий
          git push
